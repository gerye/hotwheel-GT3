<!-- app/templates/seasons.html -->
{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>赛季</h2>
  <a class="btn" href="/market">转会市场</a>
  {% if not active %}
  <form method="post" action="/seasons" style="display:flex;gap:8px">
    <input name="name" placeholder="新赛季名称,如 2026 S1" required>
    <button class="btn">开启新赛季</button>
  </form>
  {% else %}
  <p>当前赛季:<strong>{{ active.name }}</strong>(进行中)
    <form method="post" action="/seasons/{{ active.id }}/end" style="display:inline">
      <button class="btn">结束当前赛季</button>
    </form>
  </p>
  {% endif %}
  {% for s in seasons %}
  <a class="row" href="/seasons/{{ s.id }}"><span style="flex:1">{{ s.name }}</span><span class="tag">{{ s.status.value }}</span></a>
  {% else %}<p>暂无赛季</p>{% endfor %}
</div>

<div class="card" style="border-color:#f5c2c2">
  <h3 style="color:#b00">危险操作</h3>
  <p><small>清空全部数据:删除所有赛季、比赛、赛车、车队记录(测试完用)。<strong>不可恢复!</strong></small></p>
  <form method="post" action="/admin/wipe-all"
        onsubmit="return confirm('确定清空全部数据吗?\n所有赛季、比赛、赛车、车队记录都会被永久删除,且无法恢复!')">
    <button class="btn" type="submit" style="border-color:#b00;color:#b00">清空所有数据</button>
  </form>
</div>
{% endblock %}
