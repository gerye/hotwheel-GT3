{% for car in cars %}
<div class="row">
  <a href="/cars/{{ car.id }}" style="flex:1;display:flex;gap:12px;align-items:center;text-decoration:none;color:inherit">
    {% if car.image_path %}<img src="/static/uploads/{{ car.image_path }}">{% else %}<span class="thumb"></span>{% endif %}
    <span>
      <strong>{{ car.nickname }}</strong><br>
      <small>{{ car.casting }} · {{ car.brand }} · {{ team_names.get(car.team_id, "无车队") }}</small>
    </span>
  </a>
  <span class="tag">{{ car.category.value }}</span>
  <form method="post" action="/cars/{{ car.id }}/status" style="margin:0">
    <input type="hidden" name="next" value="/database">
    <select name="status" onchange="this.form.submit()" style="width:auto;padding:4px">
      {% for s in ["未签约","现役","退役"] %}
      <option value="{{ s }}" {{ "selected" if car.status.value == s else "" }}>{{ s }}</option>
      {% endfor %}
    </select>
  </form>
  <span><small>MMR {{ car.season_mmr | round | int }}</small></span>
</div>
{% else %}
<p>暂无赛车</p>
{% endfor %}
