<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}风火轮 GT3{% endblock %}</title>
  <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="/static/style.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <nav class="topnav">
    <a href="/database">数据库</a>
    <a href="/races">赛事</a>
    <a href="/standings">荣誉榜</a>
    <a href="/seasons">赛季</a>
  </nav>
  <main>
    {% if request.query_params.get('err') %}
    <div class="error" style="background:#fdecec;border:1px solid #f5c2c2;padding:10px 12px;border-radius:8px;margin-bottom:12px">
      {{ request.query_params.get('err') }}
    </div>
    {% endif %}
    {% block content %}{% endblock %}
  </main>
  <footer style="text-align:center;padding:20px;margin-top:24px;border-top:1px solid #eee;color:#777">
    <div style="font-size:14px;margin-bottom:8px">📱 手机扫码访问(需连同一 WiFi)</div>
    <img src="/qr.png" alt="扫码访问" width="160" height="160" style="border-radius:8px">
    <div style="font-size:13px;margin-top:6px">{{ access_url() }}</div>
  </footer>

  <!-- 点击放大:所有 /static/uploads/ 的车子图片 -->
  <div id="lightbox"><img alt="放大图"></div>
  <script>
  (function () {
    var lb = document.getElementById('lightbox');
    var lbImg = lb.querySelector('img');
    document.addEventListener('click', function (e) {
      if (lb.classList.contains('open')) { lb.classList.remove('open'); return; }
      var t = e.target;
      if (t.tagName === 'IMG' && (t.getAttribute('src') || '').indexOf('/static/uploads/') === 0) {
        e.preventDefault();           // 阻止外层链接跳转
        lbImg.src = t.src;
        lb.classList.add('open');
      }
    });
    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') lb.classList.remove('open');
    });
  })();
  </script>
</body>
</html>
