{% extends "base.html" %}
{% block content %}
<div class="card">
  <h2>并列,需要裁决</h2>
  <p>以下赛车总分并列,请从中选出 <strong>{{ slots }}</strong> 名晋级者:</p>
  <form method="post" action="/races/{{ race_id }}/tie/{{ group_id }}">
    {% for cid in tied %}
    <label style="display:flex;gap:8px"><input type="checkbox" name="winner_car_id" value="{{ cid }}" style="width:auto"> {{ names[cid] }}</label>
    {% endfor %}
    <div style="margin-top:12px"><button class="btn">确定晋级者({{ slots }} 名)</button></div>
  </form>
</div>
{% endblock %}
